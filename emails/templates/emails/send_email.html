<!DOCTYPE html>
<html>
<head>
    <title>Send Email</title>
</head>
<body>

    <h1>Send Message to Email</h1>

    {% if messages %}
        {% for message in messages %}
            <p>{{ message }}</p>
        {% endfor %}
    {% endif %}

    <form method="POST">
        {% csrf_token %}

        <label>Email:</label><br>
        <input type="email" name="email" placeholder="receiver@example.com" required>
        <br><br>

        <label>Subject:</label><br>
        <input type="text" name="subject" placeholder="Email subject" required>
        <br><br>

        <label>Message:</label><br>
        <textarea name="message" rows="8" cols="40" placeholder="Type your message here..." required></textarea>
        <br><br>

        <button type="submit">Send Email</button>
    </form>

</body>
</html>
